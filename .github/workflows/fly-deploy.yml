name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "ERROR: FLY_API_TOKEN secret is missing in GitHub repo settings."
            exit 1
          fi
          if [ -z "${{ secrets.FLY_ORG }}" ]; then
            echo "ERROR: FLY_ORG secret is missing in GitHub repo settings."
            exit 1
          fi

      - name: Verify Fly authentication
        run: flyctl auth whoami
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Bootstrap Fly app and volume
        run: |
          set -euo pipefail
          APP="sahayata-board-cjp"
          ORG="${{ secrets.FLY_ORG }}"

          if ! flyctl apps list | grep -qw "$APP"; then
            echo "Creating app $APP in org $ORG..."
            flyctl apps create "$APP" --org "$ORG"
          else
            echo "App $APP already exists."
          fi

          if ! flyctl volumes list -a "$APP" | grep -q sahayata_data; then
            echo "Creating volume sahayata_data in bom..."
            flyctl volumes create sahayata_data --size 1 --region bom -a "$APP" --yes
          else
            echo "Volume sahayata_data already exists."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
