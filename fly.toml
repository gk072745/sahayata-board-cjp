app = "sahayata-board-cjp"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  NODE_ENV = "production"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[mounts]
  source = "sahayata_data"
  destination = "/data"
