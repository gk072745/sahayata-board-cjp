<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1b4332" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Sahayata Board</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-text">
        <h1>Sahayata Board</h1>
        <p class="tagline">See who needs help. Offer what you can.</p>
      </div>
      <div class="header-actions">
        <button id="guidelines-btn" class="btn btn-header" type="button">Guidelines</button>
        <button id="refresh-btn" class="btn btn-header" type="button">Refresh</button>
      </div>
    </header>

    <main>
      <section id="board-panel" class="panel active">
        <div id="board-status" class="status-bar"></div>
        <div id="board-list" class="request-list"></div>
        <p id="board-empty" class="empty hidden">No open requests right now.</p>
      </section>

      <section id="mine-panel" class="panel">
        <div id="login-section" class="card">
          <button id="back-to-board-btn" class="btn btn-secondary btn-block" type="button">Back to Board</button>
          <h2>Login to post a request</h2>
          <p class="hint">First time? Enter a username and password — your account is created automatically.</p>
          <form id="login-form">
            <label>
              Username
              <input name="username" required minlength="3" autocomplete="username" />
            </label>
            <label>
              Password
              <input name="password" type="password" required minlength="4" autocomplete="current-password" />
            </label>
            <button class="btn btn-primary btn-block" type="submit">Login</button>
          </form>
        </div>

        <div id="mine-dashboard" class="hidden">
          <div class="card dashboard-header">
            <p>Logged in as <strong id="logged-in-user"></strong></p>
            <button id="logout-btn" class="btn btn-secondary" type="button">Logout</button>
          </div>
          <div id="mine-content"></div>
        </div>
      </section>
    </main>

    <div class="bottom-bar">
      <button id="post-request-btn" class="btn btn-primary btn-block" type="button">
        Post a Request / अनुरोध करें
      </button>
    </div>

    <div id="guidelines-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-guidelines="true"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="guidelines-title">
        <button class="modal-close" type="button" data-close-guidelines="true" aria-label="Close">&times;</button>
        <div id="guidelines-content"></div>
      </div>
    </div>

    <div id="detail-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close="true"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="detail-title">
        <button class="modal-close" type="button" data-close="true" aria-label="Close">&times;</button>
        <div id="detail-content"></div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
